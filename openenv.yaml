name: fraud-detection-env
version: 1.0.0
description: Scientific paper fraud detection environment where agents review research papers for data fabrication and misconduct
author: Shreyansh
tags:
  - research-integrity
  - fraud-detection
  - scientific-review
  - data-analysis
real_world_task: true
task_category: content_moderation

observation_space:
  type: dict
  properties:
    paper_metadata:
      type: dict
      description: Title, authors, journal, and field of the paper under review
    published_stats:
      type: dict
      description: Summary statistics reported in the published paper
    available_raw_data:
      type: array
      description: Raw datasets that have been requested and are available for analysis
    test_results:
      type: dict
      description: Results from statistical tests run on the data
    author_responses:
      type: array
      description: Responses received from authors when questioned
    step_count:
      type: integer
      description: Current step number in the review process

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - request_raw_data
        - run_statistical_test
        - request_author_explanation
        - flag_paper
        - issue_verdict
      description: Type of action to take in the fraud investigation
    dataset_id:
      type: string
      description: ID of dataset to request (for request_raw_data)
    test_name:
      type: string
      enum:
        - benford
        - digit_frequency
        - correlation_check
        - timestamp_consistency
        - outlier_detection
      description: Statistical test to run (for run_statistical_test)
    severity:
      type: integer
      minimum: 1
      maximum: 5
      description: Severity level of fraud suspicion (for flag_paper)
    verdict:
      type: string
      enum:
        - retract
        - require_revision
        - accept
      description: Final decision on the paper (for issue_verdict)

reward_range:
  min: 0.0
  max: 1.0

tasks:
  - name: easy
    description: Detect obvious duplicate rows in experimental data
    difficulty: easy
    success_criteria: Identify duplicate_rows fabrication in raw_data_1
  - name: medium
    description: Detect Benford's law violations in reaction time measurements
    difficulty: medium
    success_criteria: Identify benford_violation in raw_data_2
  - name: hard
    description: Detect impossible correlations and timestamp reuse across multiple datasets
    difficulty: hard
    success_criteria: Identify multi_paper_fabrication across exp_A and exp_B

episode_limit: 15
real_world_application: |
  This environment simulates the critical real-world task of scientific peer review 
  and research integrity checking. Journal editors and review boards must detect 
  fraudulent data in research papers to maintain scientific credibility. This is 
  a significant problem - studies estimate 2% of scientists admit to fabricating data.
  
  Real-world use cases:
  - Pre-publication peer review at academic journals
  - Post-publication review and retraction processes
  - Institutional research integrity investigations
  - Grant proposal review and verification